<div class="info-card">
  <h2>MikroTel</h2>

  <div class="rating">
    <span *ngFor="let star of stars" 
          (click)="setRating(star)" 
          (mouseenter)="setHover(star)" 
          (mouseleave)="setHover(0)"
          [class.active]="star <= (hoverRating || rating)">
      ★
    </span>
    <small>{{ rating > 0 ? '(' + rating + '/5)' : '(Califica aquí)' }}</small>
  </div>

  <p class="status" [class.abierto]="esHorarioLaboral()">
    {{ esHorarioLaboral() ? '● Abierto ahora (9am - 5pm)' : '○ Cerrado' }}
  </p>

  <hr>

  <div class="details">
    <p><strong>📍 Dirección:</strong> Pedro Vicente Maldonado #14-104 y Guillermina García, Ibarra</p>
    <p><strong>📞 Teléfono:</strong> <a href="tel:+593989268684">0989268684</a></p>
    <p><strong>📧 Email:</strong> <a href="mailto:mikrotel.sas@gmail.com">mikrotel.sas@gmail.com</a></p>
  </div>
</div>
