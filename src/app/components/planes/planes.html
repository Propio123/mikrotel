<section class="py-20 bg-gray-50">
  <div class="container mx-auto px-6 text-center">
    <h2 class="text-4xl font-bold text-gray-900 mb-12">Nuestros Planes de Fibra</h2>
    <div class="grid md:grid-cols-3 gap-8">
      <div *ngFor="let plan of planes" class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 hover:border-blue-500 transition-all duration-300">
        <h3 class="text-xl font-bold text-gray-700">{{ plan.nombre }}</h3>
        <p class="text-5xl font-bold text-blue-600 my-6">{{ plan.velocidad }}</p>
        <p class="text-2xl font-bold text-gray-900 mb-6">${{ plan.precio }} <span class="text-sm font-normal text-gray-500">/mes</span></p>
        <button class="w-full py-3 rounded-xl bg-blue-600 text-white font-semibold hover:bg-blue-700">Contratar</button>
      </div>
    </div>
    
  </div>
  <div class="container mx-auto px-6 text-center">
    <h2 class="text-4xl font-bold text-gray-900 mb-12">Nuestros Planes de Antena</h2>
    <div class="grid md:grid-cols-3 gap-8">
      <div *ngFor="let plan of planesantena" class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 hover:border-blue-500 transition-all duration-300">
        <h3 class="text-xl font-bold text-gray-700">{{ plan.nombre }}</h3>
        <p class="text-5xl font-bold text-blue-600 my-6">{{ plan.velocidad }}</p>
        <p class="text-2xl font-bold text-gray-900 mb-6">${{ plan.precio }} <span class="text-sm font-normal text-gray-500">/mes</span></p>
        <button class="w-full py-3 rounded-xl bg-blue-600 text-white font-semibold hover:bg-blue-700">Contratar</button>
      </div>
    </div>
    
  </div>
</section>
